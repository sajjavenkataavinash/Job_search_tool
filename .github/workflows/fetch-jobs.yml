name: Fetch Jobs Daily

on:
  schedule:
    - cron: '0 12 * * *'   # Runs daily at 12 PM UTC (8 AM ET)
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch jobs from Adzuna
        run: node fetch-jobs.js
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}

      - name: Commit and push updated jobs.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jobs.json
          git diff --staged --quiet || git commit -m "Auto-update jobs — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
