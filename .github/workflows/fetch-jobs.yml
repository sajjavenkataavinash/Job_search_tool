name: Fetch Jobs Daily

on:
  schedule:
    - cron: '0 13 * * *'   # Runs daily at 9 AM EST / 8 AM EDT
  workflow_dispatch:         # Also allows manual trigger from GitHub UI

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch jobs from JSearch
        run: node fetch-jobs.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Generate resumes for high-match jobs (score >= 7)
        run: node generate-resume.js --auto
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated jobs.json and resumes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jobs.json resumes/
          git diff --staged --quiet || git commit -m "Auto-update jobs + resumes — $(date +'%Y-%m-%d %H:%M UTC')"
          git push
